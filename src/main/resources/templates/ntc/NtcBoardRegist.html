<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>공지사항 등록 / Notice Register</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h2 { margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    label.field-label { display: block; font-weight: bold; margin-bottom: 4px; color: #333; }
    input[type=text], textarea, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    textarea { height: 150px; }
    .btn { padding: 6px 14px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
    .btn-primary { background: #333; color: #fff; border-color: #333; }
    .footer { margin-top: 24px; display: flex; gap: 8px; }
    .required { color: red; }
  </style>
</head>
<body>

  <h2>공지사항 등록 / Notice Register</h2>

  <form th:action="@{/ntcBoard/insert.do}" method="post" th:object="${ntcBoardVO}">

    <div class="form-group">
      <label class="field-label">
        제목 / Title <span class="required">*</span>
      </label>
      <label>
        <input type="text" th:field="*{noticeTitle}"
               placeholder="제목을 입력하세요 / Enter title" required/>
      </label>
    </div>

    <div class="form-group">
      <label class="field-label">내용 / Content</label>
      <label>
<textarea th:field="*{noticeCn}"
          placeholder="내용을 입력하세요 / Enter content"></textarea>
      </label>
    </div>

    <div class="form-group">
      <label class="field-label">사용여부 / Status</label>
      <label><input type="radio" th:field="*{useYn}" value="Y"/> 사용 / Active</label>
      &nbsp;
      <label><input type="radio" th:field="*{useYn}" value="N"/> 미사용 / Inactive</label>
    </div>

    <div class="footer">
      <a th:href="@{/ntcBoard/list.do}" class="btn">목록 / List</a>
      <button type="submit" class="btn btn-primary">등록 / Register</button>
    </div>

  </form>

</body>
</html>
