spring:
  application:
    name: saas-practices
  datasource:
    url: jdbc:postgresql://localhost:5432/practice_db
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    # shows exact SQL + bound parameters + result row count
    com.henheang.saaspractices.ntc.mapper: DEBUG
    # shows SQL with actual values filled in (not ? placeholders)
    org.mybatis: DEBUG
